name: CI
on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
  push:
    branches:
      - main
    tags: ['*']
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
          - '1.10'
          - '1.11'
        os:
          - ubuntu-latest
        arch:
          - x64
    env:
      PYTHON: ""
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/install-juliaup@v2
        with:
          channel: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - name: Run testitems
        uses: julia-actions/julia-run-testitems@main
        with:
          juliaup-channel: ${{ matrix.version }}
          profile-name: ${{ format('Julia {0}', matrix.version) }}
          results-path: ${{ format('testitemresults-{0}.json', matrix.version) }}
          testitem-timeout: '1800'
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: ${{ format('testitemresults-{0}', matrix.version) }}
          path: ${{ format('testitemresults-{0}.json', matrix.version) }}
          retention-days: 1
      - uses: julia-actions/julia-processcoverage@v1
        if: ${{ !cancelled() }}
      - uses: codecov/codecov-action@v6
        if: ${{ !cancelled() }}
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
