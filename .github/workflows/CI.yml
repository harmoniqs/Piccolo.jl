name: CI
on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
  push:
    branches:
      - main
    tags: ['*']
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - shard ${{ matrix.shard }}/4 - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
          - '1.10'
          - '1.11'
        os:
          - ubuntu-latest
        arch:
          - x64
        shard:
          - '1'
          - '2'
          - '3'
          - '4'
    env:
      PYTHON: ""
      # Distribute @testitem blocks across `shard` parallel CI jobs.
      # Filter logic lives in test/runtests.jl.
      TEST_SHARD: ${{ matrix.shard }}
      TOTAL_SHARDS: '4'
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      # - uses: actions/cache@v1
      #   env:
      #     cache-name: cache-artifacts
      #   with:
      #     path: ~/.julia/artifacts
      #     key: ${{ runner.os }}-test-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
      #     restore-keys: |
      #       ${{ runner.os }}-test-${{ env.cache-name }}-
      #       ${{ runner.os }}-test-
      #       ${{ runner.os }}-
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        with:
          # Default 'auto' forces latest-compatible versions on dependabot/CompatHelper
          # PRs. JET compat is "0.9, 0.10, 0.11"; JET 0.10+ requires Julia 1.12, so
          # forcing latest breaks resolution on 1.10/1.11. Restrict the force-latest
          # behavior to 1.12 (where dependabot can actually exercise the new bound).
          force_latest_compatible_version: ${{ matrix.version == '1.12' && 'auto' || 'false' }}
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
